    <header>
        Перші письмові згадки про слов’ян: політичний устрій, побут, звичаї та традиції слов’ян за античними та арабськими джерелами
    </header>
    
    <div class="main">
    
        <div class="timeline">
    
            <div class="point" style="left:10%;" data-text="Перші письмові згадки про слов’ян пов’язані з античною традицією І–ІІ ст. н. е., де вони ще не виступають під власною назвою, а фіксуються як венеди. У творах Плінія Старшого, Публія Корнелія Тацита та Клавдія Птолемея цей етнонім уживається як узагальнене позначення населення на схід від германського світу. У Природничій історії (77 р. н. е.) Пліній Старший згадує венедів серед народів, що населяють південне узбережжя Балтійського моря. У «Германії» Тацит подає коротку характеристику венедів, розміщуючи їх між германцями та сарматами і підкреслюючи їхню відмінність від обох груп. У географічній системі Клавдія Птолемея венеди локалізовані ширше: на північ від Карпат, у басейнах Вісли та Дністра, а також поблизу гирла Дунаю.<img src='7.jpg' alt='' width='400'> 
            У VI ст. візантійська історіографія вводить новий етнонім – слов’яни (склавини, словени), що поступово витісняє попереднє означення «венеди». У працях Прокопія Кесарійського, Йордана, Менандра Протектора, Феофілакта Симокатти та Маврикія Стратега ці назви вживаються вже системно. У Історії війн (550–554 рр.) Прокопій Кесарійський не лише використовує назви «склавини» і «анти», а й прямо пов’язує їх із давнішими венедами, зазначаючи спадковість між цими етнонімами. У Гетиці Йордана вперше чітко сформульовано трикомпонентний поділ: венеди, анти, склавини, причому венеди подані як давніша, ширша назва, від якої походять інші.<br><br>
            У візантійських джерелах VI–VII ст. етноніми «склавини» та «анти» фіксуються як усталені терміни. У фрагментах твору Менандра Протектора згадуються «Σκλαβηνοί» (склавини) й «Ἄνται» (анти) у контексті подій на Балканах; у збережених уривках прямо вживаються ці назви без додаткових пояснень їхнього походження. У хроніці Феофілакта Симокатти також послідовно використано форми «Σκλαβηνοί» та «Ἄνται» для позначення слов’янських груп. У трактаті Маврикія Стратега «Стратегікон» (кінець VI ст.) вжито формулювання: «τὰ τῶν Σκλαβηνῶν καὶ Ἀντῶν ἔθνη» («племена склавинів і антів»), де ці назви подані як загальноприйняті етноніми.<br><br>
            У арабських і перськомовних творах IX–X ст. слов’яни фіксуються під узагальненим етнонімом «сакаліба» (араб. ṣaqāliba). У тексті Ібн-Русте (поч. X ст.) прямо вжито формулювання: «ас-Ṣaqāliba» як назву окремого народу; у розділі про них подано опис їхніх земель і сусідів. У праці аль-Масуді («Murūj adh-dhahab») також використано форму «ṣaqāliba» для позначення слов’ян як великої групи народів Європи. У записках Ібн-Фадлана (921–922 рр.) цей термін уживається поряд з іншими етнонімами, що відображає його загальноприйнятість у тогочасній арабській традиції.<br><br>
            У повідомленнях Ібрагіма ібн Якуба (друга половина X ст.) згадується «білād ас-Ṣaqāliba» («країна слов’ян»), що виступає як географічно визначена область. У творах, пов’язаних із традицією аль-Джайхані, зокрема у Книзі шляхів і країн, назва «сакаліба» систематично використовується в переліках народів Європи. У цих текстах вона подається як усталений етнонім без пояснень походження, що свідчить про його закріплення в арабській географічній традиції IX–X ст.<br><br>
            У джерелах IX–X ст. слов’яни фіксуються не лише як узагальнений етнос, а й як сукупність окремих регіональних груп. Поряд із назвою «сакаліба» в арабських авторів з’являються конкретніші згадки про західнослов’янські та східнослов’янські землі (зокрема у Ібрагіма ібн Якуба описано країни Центральної Європи, а у Ібн-Русте — окремі «країни слов’ян»). Подальші писемні пам’ятки XI–XII ст., передусім літописні, зокрема Повість минулих літ, містять перелік конкретних племінних об’єднань (поляни, деревляни, сіверяни, тиверці, уличі) та вказівки на території їхнього розселення.<br><br>
            ">
                <span>Перші письмові згадки</span>
            </div>
    
            <div class="point" style="left:30%;" data-text="Політичний розвиток ранніх слов’ян у І тис. н. е. базувався на еволюції від родоплемінних зв’язків до перших державних утворень. Основою суспільства була територіальна (сусідська) община, що складалася з великих патріархальних сімей. Кілька таких общин утворювали локальні групи («гнізда»), які об’єднувалися у племена, а згодом у «суперсоюзи» племен.<br><br>
            Визначальною рисою політичної організації слов’ян VI ст., за свідченнями візантійських авторів, була відсутність одноосібної влади. Прокопій Кесарійський у «Історії війн» прямо зазначає:
            <i>«Ці племена, склавини й анти, не підлягають одній людині, - з давніх-давен живуть у народоправстві (демократії), тому про все, що для них корисне чи шкідливе, вони обмірковують спільно.».</i>
            Ця система, відома як військова демократія, опиралася на віче (загальні збори воїнів) та раду старійшин. Маврикій Стратег додає, що слов’яни надзвичайно волелюбні й «ніким не дозволяють себе поневолити», хоча через велику кількість дрібних вождів («риксів») їм часто бракувало єдності.<br><br><img src='9.jpg' alt='' width='400'>
            У VII–IX ст. відбулася консолідація влади, що призвела до виникнення вождеств — переддержавних структур. Арабські та перські географи (Ібн-Русте, аль-Масуді) вже чітко фіксують наявність у слов’ян правителів, яких називають «малік» (цар). Аль-Масуді згадує про давнього правителя на ім’я Маджак, якому колись підкорялися всі слов’янські племена (союз валінана/волинян).<br><br>
            Особливе місце в політичній географії Східної Європи посідало Середнє Подніпров’я. Арабські географи (аль-Істахрі, Ібн-Хаукаль) виділяють три головні центри слов’ян:Куявія (Київ — центр полянського союзу);Славія (землі ільменських словенів); Артанія (ймовірно, Ростово-Суздальська або Приазовська земля).<br><br>
            ">
                <span>Політичний устрій</span>
            </div>
    
            <div class="point" style="left:50%;" data-text="Ранні слов’яни селилися здебільшого на берегах річок та озер. Житла слов’ян були заглиблені в землю, стіни дерев’яні (там, де було достатньо лісу) або плетені з хмизу (в тих місцях, де лісу було мало) й обмазані товстим шаром глини. Будували підвальні ями для зберігання продуктів харчування. У кожній хаті була піч, складена з каміння і глини, розташована в кутку оселі. Дахи будинків були двосхилими, покритими деревом, очеретом або соломою. Свої поселення слов’яни укріпляли валами і ровами. Прокопій Кесарійський зазначав: «живуть вони в жалюгідних хатинах, розміщених далеко одна від одної, і кожний змінює... часто, місто проживання». Корнелій Тацит у творі «Германія» додає, що венеди живуть осіло і займаються переважно сільським господарством, є вправними воїнами і ведуть успішні війни проти сусідів.
                <div class='img-row'>
                <img src='10.jpg' width='350'>
                <img src='11.jpg' width='350'>
            </div>  
            У слов’янському господарстві переважало землеробство, передусім підсічне (поліська зона), встановлювалось орне (лісостеп). Поступово перелогова система землекористування почала витіснятися двопіллям. Серед злаків культивувалися жито, ячмінь, а трохи пізніше й пшениця. Розвивалось скотарство, насамперед вирощування великої рогатої худоби та свиней. Арабський вчений X ст. Ібн-Русте у «Книзі дорогоцінних скарбів» відмічав наявність бджолярства, поширене випасання свиней, овець та вирощування проса:
            <i>«Найбільше сіють просо, в жнива беруть просіяні зерна проса в корці, підносять до неба й кажуть: Боже, ти дав нам страву, дай і тепер її досить! Є в них ріжні кобзи, гуслі і дудки; дудки довгі на два лікті, а кобза має вісім струн. Напиток роблять собі з меду».</i>
            Дедалі більше удосконалювались ремесла. Металообробкою — виготовленням знарядь праці із заліза або прикрас із кольорових металів — займалися майстри-професіонали. Водночас гончарство, ткацтво, вичинка шкур, обробка каменю і дерева здебільшого залишалися у родинних межах. Керамічний посуд характеризується наявністю кількох типів: різних горщиків, мисок, сковорідок, кухлів, які ставили в піч з невисоким склепінням. Характеристика одягу залишається фрагментарною, оскільки панував обряд спалення небіжчиків. Можна припустити, що основні риси костюма були близькі до селянського одягу доби Київської Русі, для реконструкції якого збереглися металеві деталі: фібули, пряжки та бляшки.<br><br>
            Щодо військової справи, Прокопій Кесарійський писав:
             <i>«Вступаючи в битву, більшість йде на ворогів пішими, маючи невеликі щити і списи в руках. Панцира ж ніколи на себе не одягають; деякі не мають ні хітона, ні плаща, тільки штани... Всі вони і високі, і дуже сильні… Спосіб життя (їх) грубий і невибагливий…». </i>
            Воєнні походи попервах були справою добровільною, але пізніше починає виділятися дружина, для якої війна стає професійним заняттям. Також під час розкладу первісних відносин з’явилося рабство. Прокопій повідомляв: 
            <i>«Склавини завжди вбивали всіх, хто (їм) зустрічався. Але тепер… вони… вирішили взяти в полон деяких із тих, хто потрапив їм до рук, і тому всі вони повертались додому, женучи з собою тисячі полонених».</i>
            ">
                <span>Побут</span>
            </div>
    
            <div class="point" style="left:70%;" data-text="Духовна культура давніх слов’ян базувалася на розгалуженій системі язичницьких вірувань, де центральне місце посідало обожнювання сил природи. За свідченнями Прокопія Кесарійського («Війна з готами»), слов’яни вважали єдиним владикою всесвіту бога, творця блискавок (Перуна), якому приносили в жертву биків та здійснювали інші священні обряди. Водночас вони не визнавали фатальної сили долі: у ситуаціях смертельної небезпеки слов’яни давали обітницю богу принести жертву за свою душу, віруючи, що порятунок можна буквально «купити» ціною цієї офіри. Крім верховних божеств, таких як Род (бог неба і землі), Велес (покровитель багатства і худоби) та Дажбог (сонячне божество), слов’яни вшановували річки, німф та інші стихійні сили, здійснюючи біля них ворожіння.<img src='14.jpg' alt='' width='300'>
            Для відправлення культів використовувалися спеціальні споруди: капища, храми та требища. Археологічним підтвердженням цього є святилище, відкрите В. Хвойкою на Старокиївській горі. Об’єктами поклоніння виступали ідоли з дерева чи каменю, найвідомішим з яких є Збруцький ідол. Його чотиригранна структура відображала поширений у давнину поділ Всесвіту на три яруси: небо (світ богів), землю (світ людей) та підземний світ. Важливу роль відігравали божества родючості, зокрема Рожаниці, яким приносили безкровні жертви у вигляді каші та хліба. Спеціальні види обрядової їжі — кутя та коливо (із пшеничних зерен) мали виключно ритуальне призначення і використовувалися як під час свят, так і в поминальних обрядах.<img src='12.jpg' alt='' width='400'>
            Надзвичайно стійким був культ предків. Слов'яни почитали душі померлих («дідів»), вважаючи, що вони перебувають у середньому небі «Ірії» (Вирії), і сприяють атмосферним явищам (дощу, туману, снігу) на благо нащадкам. У дні поминання душі предків символічно запрошували на святкову трапезу. Вірування знайшли пряме відображення в поховальному обряді — кремації, де вогнище часто споруджувалось у вигляді будинку. Прах небіжчика збирався в урну і ставився на кургані, де через рік родина справляла поминальну тризну. Жінки на знак жалоби здійснювали ритуальні самоушкодження — роздирали собі ножем руки та обличчя. Присутність у похованнях знатних осіб зброї, коней чи наложниць свідчить про глибоку віру в продовження соціального статусу в потойбіччі.<img src='13.jpg' alt='' width='500'>
            Звичаї слов’ян мали виразний воїнський та аграрний характер. Як зазначав Ібн-Русте: <i>«При народженні сина, батько клав перед ним меч зі словами: «Не залишаю тобі в спадщину ніякого майна, матимеш тільки те, що здобудеш цим мечем».</i>
            
            Масові народні дійства були пов’язані з землеробським календарем і мали магічний характер, спрямований на забезпечення добробуту общини. Проте в часи екстремальних лих (голоду чи неврожаю) магічне мислення призводило до жорстоких ритуалів: волхви могли ініціювати вбивство або вигнання осіб (так званої «старої гаді»), яких звинувачували у магічному впливі на врожай. На відміну від античної традиції, слов’янський культ природи не звільнив людину від страху перед її таємничими силами, тому побут був насичений використанням численних оберегів: антропоморфних та зооморфних фігурок із дерева, металу чи кістки.
            ">
                <span>Звичаї та традиції</span>
            </div>
    
        </div>
